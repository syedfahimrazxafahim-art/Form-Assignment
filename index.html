<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Fahim</title>
</head>
<body>
    h1>User Registration Form</h1>
    <form action=
    <label for="first name">First Name:</label>
    <input type="text" id="first name"><br><br>
    <label for="last name">Last Name:</label>
    <input type="text" id="Last Name"><br><br>
    <label for="Password">Password:</label>
    <input type="text" id="Password"><br><br>
    <label for="bio">Bio:</label><br>
    <textarea id="bio" name="bio" rows="4" cols="30"></textarea><br><br>
    <fieldset>
        <legend>Gender:</legend>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>
        <input type="radio" id="Other" name="gender" value="Other>"
        <label for="Other">Other</label><br>
    </fieldset><br>
    <fieldset>
        <legend>Interests:</legend>
        <input type="checkbox" id="Music" name="interrest[]" value="music">
        <lable for="music">Music</lable><br>
        <input type="checkbox" id="Sports" name="interrest[]" value="Sports">
        <lable for="Sports">Sports</lable><br>
        <input type="checkbox" id="Reading" name="interrest[]" value="Reading">
        <label for="Reading">Reading</label><br>
    </fieldset>
    <lable for="Country">Country</lable><br>
    <select id="country" name="Country">
        <option value="Us">United States</option>
        <option value="Pk">Pakisan</option>
        <option value="in">India</option>
    </select><br><br>
    <lable for="color">preferred color:</lable>
    <input type="color" id="color" name="color"><br><br>

    <label for="Profile">Profile Picture:</label>
    <input type="File" id="Profile" name="Profile"><br><br>

    <label for="Birthday">Birthday:</label>
    <input type="date" id="Birthday" name="Birthday"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="Email" name="Email"><br><br>

    <label for="website">Website</label>
    <input type="url" id="url" name="Url"><br><br>

    <label for="Search">Search</label>
    <input type="Search" id="Search" name="Search"><br><br>

    <input type="Submit" id="Submit" name="Submit"><br>
    </form>
</body>
</html>
